<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Photo Album</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Photo Album</h1>
    <p class="tag">upload photos, then search them with plain english.</p>
  </header>

  <section class="card">
    <h2>Search</h2>
    <form id="search-form">
      <input id="q" type="text" placeholder="show me dogs and cats" autocomplete="off" required>
      <button type="submit">Search</button>
    </form>
    <p id="search-status" class="status"></p>
    <div id="results" class="results"></div>
  </section>

  <section class="card">
    <h2>Upload</h2>
    <form id="upload-form">
      <input id="file" type="file" accept="image/*" required>
      <input id="labels" type="text" placeholder="custom labels (comma separated)">
      <button type="submit">Upload</button>
    </form>
    <p id="upload-status" class="status"></p>
  </section>

  <script src="config.js"></script>
  <script src="scripts.js"></script>
</body>
</html>
