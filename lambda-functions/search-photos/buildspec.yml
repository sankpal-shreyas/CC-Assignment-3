version: 0.2

# CodeBuild spec for search-photos. Same shape as index-photos.
# Expects env vars: FUNCTION_NAME, AWS_DEFAULT_REGION

phases:
  install:
    runtime-versions:
      python: 3.11
  build:
    commands:
      - cd lambda-functions/search-photos
      - rm -rf build && mkdir build
      - pip install -r requirements.txt -t build/
      - cp lambda_function.py build/
      - cd build && zip -rq ../function.zip . && cd ..
      - aws lambda update-function-code
          --function-name "$FUNCTION_NAME"
          --zip-file fileb://function.zip
          --region "$AWS_DEFAULT_REGION"

artifacts:
  files:
    - lambda-functions/search-photos/function.zip
  discard-paths: yes
